<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wegoinn Mobile - Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mobile-red-city.css">
</head>
<body>
<div class="mobile-app">
    <header class="mobile-header">
        <a class="brand" href="mobile-home.html"><img src="images/logoRed.png" alt="Wegoinn"></a>
        <div class="lang-toggle"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="ko">KO</button></div>
        <button class="menu-btn" aria-label="menu"><span></span><span></span><span></span></button>
        <img class="corner-sloth" src="images/slothJoy.png" alt="sloth">
    </header>
    <nav class="mobile-menu">
            <a href="mobile-about.html" data-ko="소개" data-en="About">소개</a>
            <a href="mobile-rooms.html" data-ko="객실 유형" data-en="Room Types">객실 유형</a>
            <a href="mobile-facilities.html" data-ko="시설" data-en="Facilities">시설</a>
            <a href="mobile-location.html" data-ko="찾아오시는 길" data-en="Location">찾아오시는 길</a>
            <a href="mobile-faq.html" data-ko="자주 묻는 질문" data-en="FAQ">자주 묻는 질문</a>
            <a href="mobile-contact.html" data-ko="연락처" data-en="Contact">연락처</a>
        </nav>

    <main class="main">
        <section class="panel">
            <h2 class="section-title" data-ko="연락처" data-en="Contact">연락처</h2>
            <div class="contact-cta">
                <a href="tel:023939922">📞 Call Us</a>
                <a href="mailto:wegoinnteam@gmail.com">✉ Email Us</a>
                <a href="https://maps.google.com/?q=141+Sinchon-ro+Seodaemun-gu+Seoul" target="_blank" rel="noopener">📍 Open in Maps</a>
            </div>
            <form class="message-form" action="https://formspree.io/f/xjgpkpny" method="POST">
                <input type="hidden" name="_subject" value="[Wegoinn Mobile Contact] New Inquiry">
                <input type="email" id="contactEmail" name="email" placeholder="Email (required)" required>
                <input type="text" id="contactReservation" name="reservation" placeholder="Reservation Number (optional)">
                <input type="text" id="contactName" name="name" placeholder="Name">
                <textarea id="contactMessage" name="message" placeholder="Message" required></textarea>
                <button type="submit">SEND</button>
            </form>
        </section>
    </main>

    <nav class="mobile-bottom-nav">
        <a href="mobile-home.html"><span class="icon">⌂</span><span data-ko="홈" data-en="Home">홈</span></a>
        <a href="mobile-rooms.html"><span class="icon">🛏</span><span data-ko="객실" data-en="Rooms">객실</span></a>
        <a href="mobile-facilities.html"><span class="icon">☕</span><span data-ko="시설" data-en="Facilities">시설</span></a>
        <a href="mobile-location.html"><span class="icon">◎</span><span data-ko="위치" data-en="Location">위치</span></a>
        <a href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener"><span class="icon">🗂</span><span data-ko="예약하기" data-en="Book Now">예약하기</span></a>
    </nav>
</div>
<script src="mobile-red-city.js"></script>

<script id="formspree-submit-handler">
(function () {
  const forms = document.querySelectorAll('form[action="https://formspree.io/f/xjgpkpny"]');
  forms.forEach((form) => {
    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const data = new FormData(form);
      try {
        await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
      } catch (_) {}
      alert('제출되었습니다.');
      form.reset();
    });
  });
})();
</script>
</body>
</html>
