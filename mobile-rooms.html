                <article class="room-card"><img src="images/singleNew.jpg" alt="Single"><div class="info"><h3>Single</h3><div class="room-meta"><span>🛏 1 Bed</span><span>👤 1</span></div><a class="reserve-btn" href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener">RESERVE</a></div></article>
