<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wegoinn Mobile - Location</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mobile-red-city.css?v=20260402-4">
</head>
<body>
<div class="mobile-app">
    <header class="mobile-header">
        <a class="brand" href="mobile-home.html"><img src="images/logoRed.png" alt="Wegoinn"></a>
        <div class="lang-toggle"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="ko">KO</button></div>
        <button class="menu-btn" aria-label="menu"><span></span><span></span><span></span></button>
        <img class="corner-sloth" src="images/slothRecline.png" alt="sloth">
    </header>
    <nav class="mobile-menu">
            <a href="mobile-about.html" data-ko="소개" data-en="About">소개</a>
            <a href="mobile-rooms.html" data-ko="객실 유형" data-en="Room Types">객실 유형</a>
            <a href="mobile-facilities.html" data-ko="시설" data-en="Facilities">시설</a>
            <a href="mobile-location.html" data-ko="찾아오시는 길" data-en="Location">찾아오시는 길</a>
            <a href="mobile-faq.html" data-ko="자주 묻는 질문" data-en="FAQ">자주 묻는 질문</a>
            <a href="mobile-contact.html" data-ko="연락처" data-en="Contact">연락처</a>
        </nav>

    <main class="main">
        <section class="panel">
            <h2 class="section-title" data-ko="찾아오시는 길" data-en="Location">찾아오시는 길</h2>
            <p class="section-sub" data-ko="아래 탭을 누르면 원본 웹페이지처럼 관련 외부 사이트로 이동합니다." data-en="Tap each transport tab to open the related external guide.">아래 탭을 누르면 원본 웹페이지처럼 관련 외부 사이트로 이동합니다.</p>

            <div class="transport-tabs-mobile">
                <button type="button" onclick="openTransportLink('subway')" data-ko="지하철" data-en="Subway">지하철</button>
                <button type="button" onclick="openTransportLink('bus')" data-ko="버스" data-en="Bus">버스</button>
                <button type="button" onclick="openTransportLink('taxi')" data-ko="택시" data-en="Taxi">택시</button>
            </div>

            <div class="location-flow">
                <div class="flow-item" onclick="openTransportLink('subway')"><div class="dot">1</div><div><h4 data-ko="지하철" data-en="Subway">지하철</h4><p data-ko="인천공항 → 공항철도 탑승 → 홍대입구 환승 → 신촌역 7/8번 출구" data-en="Incheon Airport -> Airport Railroad -> transfer -> Sinchon Exit 7/8">인천공항 → 공항철도 탑승 → 홍대입구 환승 → 신촌역 7/8번 출구</p></div></div>
                <div class="flow-item" onclick="openTransportLink('bus')"><div class="dot">2</div><div><h4 data-ko="버스" data-en="Bus">버스</h4><p data-ko="공항리무진 6002번 탑승 후 신촌역 인근 정류장 하차" data-en="Take Airport Limousine 6002 and get off near Sinchon">공항리무진 6002번 탑승 후 신촌역 인근 정류장 하차</p></div></div>
                <div class="flow-item" onclick="openTransportLink('taxi')"><div class="dot">3</div><div><h4 data-ko="택시" data-en="Taxi">택시</h4><p data-ko="기사님께 '서울 서대문구 신촌로 141 위고인 호스텔' 주소 제시" data-en="Show driver: 141, Sinchon-ro, Seodaemun-gu, Seoul">기사님께 '서울 서대문구 신촌로 141 위고인 호스텔' 주소 제시</p></div></div>
            </div>

            <div class="map-box">
                <img src="images/infographicRed.png" alt="map" style="width:100%;border-radius:10px;display:block;">
                <a target="_blank" rel="noopener" href="https://maps.google.com/?q=141+Sinchon-ro+Seodaemun-gu+Seoul">Open in Maps (길찾기)</a>
            </div>
        </section>
    </main>

    <nav class="mobile-bottom-nav">
        <a href="mobile-home.html"><span class="icon">⌂</span><span data-ko="홈" data-en="Home">홈</span></a>
        <a href="mobile-rooms.html"><span class="icon">🛏</span><span data-ko="객실" data-en="Rooms">객실</span></a>
        <a href="mobile-facilities.html"><span class="icon">☕</span><span data-ko="시설" data-en="Facilities">시설</span></a>
        <a class="active" href="mobile-location.html"><span class="icon">◎</span><span data-ko="위치" data-en="Location">위치</span></a>
        <a href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener"><span class="icon">🗂</span><span data-ko="예약하기" data-en="Book Now">예약하기</span></a>
    </nav>
</div>
<script src="mobile-red-city.js?v=20260402-4"></script>
<script>
function openTransportLink(type) {
    const links = {
        subway: 'https://www.airport.kr/ap_en/1512/subview.do',
        bus: 'https://airportlimousine.co.kr/en/sub/sub01.php?cat_no=2',
        taxi: 'https://xn--ob0bj92bdidosgv4fhzh.org/index#%EB%AC%B8%EC%9D%98%ED%95%98%EA%B8%B0'
    };
    if (links[type]) {
        window.open(links[type], '_blank');
    }
}
</script>
</body>
</html>
