<head>

    <script>
        (function () {
            var isMobile = window.matchMedia("(max-width: 900px)").matches;
            if (!isMobile) return;
            var path = (window.location.pathname.split("/").pop() || "index.html").toLowerCase();
            if (path.indexOf("mobile-") === 0) return;
            window.location.replace("mobile-reservations.html" + window.location.search + window.location.hash);
        })();
    </script>
    <title data-en="Booking - WeGoInn" data-ko="예약 - 위고인">Booking - WeGoInn</title>
    <link rel="stylesheet" href="styles.css">

</head>
