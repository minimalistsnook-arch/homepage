<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wegoinn Mobile - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mobile-red-city.css">
    <style>
        body.page-home {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #efefef;
            padding: 12px;
            font-family: 'Poppins', sans-serif;
        }

        .page-home .mobile-app {
            width: 390px;
            max-width: 100%;
            height: 844px;
            min-height: 844px;
            padding: 0;
            border-radius: 0;
            border: 1px solid #d7d7d7;
            overflow: hidden;
            background: #fff;
            position: relative;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
        }

        .browser-top {
            background: #efefef;
            border-bottom: 1px solid #dddddd;
            padding: 8px 10px 6px;
        }

        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #555;
            font-size: 12px;
            margin-bottom: 6px;
            line-height: 1;
        }

        .url-bar {
            height: 40px;
            border: 1px solid #e1e1e1;
            border-radius: 10px;
            background: #f6f6f6;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: 700;
            color: #2f2f2f;
        }

        .url-bar .left,
        .url-bar .right {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #8d8d8d;
            font-size: 20px;
        }

        .url-bar .left { left: 12px; }
        .url-bar .right { right: 12px; }

        .page-home .mobile-header {
            position: relative;
            top: auto;
            left: auto;
            transform: none;
            max-width: none;
            height: 74px;
            padding: 10px 14px;
            border-bottom: 1px solid #ececec;
            display: grid;
            grid-template-columns: 1fr auto auto;
            gap: 10px;
            align-items: center;
            background: #fff;
        }

        .page-home .brand img {
            width: 90px;
            height: auto;
            display: block;
        }

        .page-home .lang-toggle {
            width: 102px;
            height: 40px;
            padding: 3px;
            border: 0;
            border-radius: 999px;
            background: #ebedf1;
            display: inline-flex;
            gap: 4px;
        }

        .page-home .lang-btn {
            flex: 1;
            border: 0;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 700;
            color: #646b78;
            background: transparent;
            padding: 0;
        }

        .page-home .lang-btn.active {
            background: #e91f3b;
            color: #fff;
            box-shadow: 0 6px 14px rgba(233, 31, 59, 0.3);
        }

        .page-home .menu-btn {
            width: 44px;
            height: 44px;
            border: 2px solid #dadde2;
            border-radius: 12px;
            background: #f8f8f8;
            display: grid;
            place-content: center;
            gap: 4px;
            justify-self: end;
        }

        .page-home .menu-btn span {
            width: 18px;
            height: 2px;
            background: #475569;
            border-radius: 2px;
            display: block;
        }

        .page-home .corner-sloth {
            position: absolute;
            right: -3px;
            top: 43px;
            width: 24px;
            z-index: 5;
        }

        .page-home .mobile-menu {
            top: 114px;
            left: 0;
            transform: translateY(-10px);
            max-width: none;
            width: 100%;
            z-index: 45;
        }

        .page-home .mobile-menu.open {
            transform: translateY(0);
        }

        .page-home .main {
            padding: 0;
        }

        .hero {
            position: relative;
            height: 525px;
            overflow: hidden;
            background: #ca0016;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .hero-copy {
            position: absolute;
            left: 16px;
            top: 12px;
            right: 16px;
            color: #fff;
            z-index: 2;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.18);
        }

        .hero-copy h1 {
            margin: 0;
            font-size: 52px;
            line-height: 1.08;
            letter-spacing: -0.04em;
            font-weight: 700;
        }

        .hero-copy p {
            margin: 8px 0 0;
            font-size: 35px;
            font-weight: 500;
            letter-spacing: -0.02em;
        }

        .hero-book {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 8px;
            width: calc(100% - 34px);
            height: 58px;
            border-radius: 999px;
            background: #fff;
            border: 2px solid #dadada;
            color: #e91f3b;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: 0.08em;
            z-index: 2;
        }

        .page-home .mobile-bottom-nav {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 74px;
            transform: none;
            max-width: none;
            width: 100%;
            height: 62px;
            padding: 5px 6px;
            border-top: 1px solid #ececec;
            background: #f8f8f8;
        }

        .page-home .mobile-bottom-nav a {
            color: #717171;
            font-size: 11px;
            font-weight: 600;
            gap: 3px;
        }

        .page-home .mobile-bottom-nav .icon {
            width: 21px;
            height: 21px;
            border-radius: 999px;
            border: 1px solid #dedede;
            font-size: 11px;
            background: #fff;
        }

        .page-home .mobile-bottom-nav a.active {
            color: #e91f3b;
        }

        .page-home .mobile-bottom-nav a.active .icon {
            color: #e91f3b;
            border-color: #f2bac5;
            background: #ffeef2;
        }

        .android-controls {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 74px;
            border-top: 1px solid #d9d9d9;
            background: #ededed;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            align-items: center;
            justify-items: center;
            font-size: 31px;
            color: #5f6368;
        }

        @media (max-width: 420px) {
            .page-home .mobile-app {
                width: 100%;
                height: calc(100vh - 24px);
                min-height: 740px;
            }

            .hero-copy h1 { font-size: 12.8vw; }
            .hero-copy p { font-size: 8.7vw; }
            .hero-book { font-size: 8.5vw; }
        }
    </style>
</head>
<body class="page-home">
    <div class="mobile-app">
        <div class="browser-top" aria-hidden="true">
            <div class="status-row">
                <span>5:42</span>
                <span>◉ 65%</span>
            </div>
            <div class="url-bar">
                <span class="left">☆</span>
                <span>wegoinn.com</span>
                <span class="right">↻</span>
            </div>
        </div>

        <header class="mobile-header">
            <a class="brand" href="mobile-home.html" aria-label="Wegoinn home">
                <img src="images/logoRed.png" alt="Wegoinn">
            </a>

            <div class="lang-toggle">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ko">KO</button>
            </div>

            <button class="menu-btn" aria-label="menu"><span></span><span></span><span></span></button>
            <img class="corner-sloth" src="images/slothHi.png" alt="sloth">
        </header>

        <nav class="mobile-menu">
            <a href="mobile-about.html" data-ko="소개" data-en="About">소개</a>
            <a href="mobile-rooms.html" data-ko="객실 유형" data-en="Room Types">객실 유형</a>
            <a href="mobile-facilities.html" data-ko="시설" data-en="Facilities">시설</a>
            <a href="mobile-location.html" data-ko="찾아오시는 길" data-en="Location">찾아오시는 길</a>
            <a href="mobile-faq.html" data-ko="자주 묻는 질문" data-en="FAQ">자주 묻는 질문</a>
            <a href="mobile-contact.html" data-ko="연락처" data-en="Contact">연락처</a>
        </nav>

        <main class="main home-main">
            <section class="hero">
                <img src="image copy 4.png" alt="Red city cover" draggable="false">
                <div class="hero-copy">
                    <h1 data-ko="위고인 호스텔" data-en="Wegoinn Hostel">위고인 호스텔</h1>
                    <p data-ko="Your Casual Seoul, We Go? INN&#33;" data-en="Your Casual Seoul, We Go? INN&#33;">Your Casual Seoul, We Go? INN&#33;</p>
                </div>
                <a class="hero-book" href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener">BOOK NOW</a>
            </section>
        </main>

        <nav class="mobile-bottom-nav">
            <a class="active" href="mobile-home.html"><span class="icon">⌂</span><span data-ko="홈" data-en="Home">홈</span></a>
            <a href="mobile-rooms.html"><span class="icon">🛏</span><span data-ko="객실" data-en="Rooms">객실</span></a>
            <a href="mobile-facilities.html"><span class="icon">☕</span><span data-ko="시설" data-en="Facilities">시설</span></a>
            <a href="mobile-location.html"><span class="icon">◎</span><span data-ko="위치" data-en="Location">위치</span></a>
            <a href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener"><span class="icon">🗂</span><span data-ko="예약하기" data-en="Book Now">예약하기</span></a>
        </nav>

        <div class="android-controls" aria-hidden="true">
            <span>‹</span>
            <span>›</span>
            <span>⌂</span>
            <span>☞</span>
            <span>☰</span>
        </div>
    </div>

    <script src="mobile-red-city.js"></script>
</body>
</html>
