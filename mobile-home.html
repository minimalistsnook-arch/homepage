<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wegoinn Mobile - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mobile-red-city.css">
    <style>
        :root {
            --hero-height: clamp(30rem, 66vh, 37.5rem);
            --header-height: 4.5rem;
            --copy-side: clamp(0.9rem, 5vw, 1.25rem);
            --copy-top: clamp(2rem, 8vh, 3.25rem);
            --book-bottom: clamp(1rem, 4.8vh, 2.5rem);
            --book-height: clamp(3.2rem, 9.2vh, 4.25rem);
            --book-width: min(88%, 22rem);
            --book-font: clamp(1rem, 5vw, 1.375rem);
            --nav-rise: clamp(3.8rem, 9.2vh, 5.25rem);
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
        }

        .mobile-app {
            min-height: var(--app-vh, 100vh);
            padding-bottom: 0;
        }

        .home-main {
            padding: 0;
            height: calc(var(--app-vh, 100vh) - var(--header-height));
            min-height: calc(100vh - var(--header-height));
        }

        .home-hero {
            position: relative;
            height: 100%;
            min-height: 0;
            max-height: none;
            overflow: hidden;
            background: #cb0018;
        }

        .home-hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: right top;
            display: block;
            user-select: none;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .home-copy {
            position: absolute;
            top: var(--copy-top);
            left: var(--copy-side);
            right: var(--copy-side);
            color: #ffffff;
            z-index: 3;
            text-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.2);
        }

        .home-copy h1 {
            margin: 0;
            max-width: 18ch;
            font-size: clamp(1.6rem, 6.6vw, 2rem);
            line-height: 1.13;
            font-weight: 700;
            letter-spacing: -0.02em;
            overflow-wrap: anywhere;
        }

        .home-copy p {
            margin: clamp(0.45rem, 1.5vh, 0.7rem) 0 0;
            max-width: 28ch;
            font-size: clamp(0.95rem, 4.2vw, 1.125rem);
            line-height: 1.32;
            font-weight: 500;
            letter-spacing: -0.01em;
            overflow-wrap: anywhere;
        }

        .home-book {
            position: absolute;
            left: 50%;
            transform: translateX(-50%) translateY(0);
            bottom: var(--book-bottom);
            width: var(--book-width);
            min-width: 14rem;
            max-width: 92%;
            height: var(--book-height);
            border-radius: 999rem;
            border: 0.125rem solid #dddddd;
            background: #ffffff;
            color: #e81e3a;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--book-font);
            font-weight: 700;
            letter-spacing: 0.06em;
            z-index: 3;
            transition: opacity 0.24s ease, transform 0.24s ease;
            white-space: nowrap;
            padding-inline: 1rem;
        }

        body:not(.home-nav-hidden) .home-book {
            transform: translateX(-50%) translateY(calc(-1 * var(--nav-rise)));
            opacity: 1;
            pointer-events: auto;
        }

        body.home-nav-hidden .home-book {
            transform: translateX(-50%) translateY(calc(-1 * var(--nav-rise)));
            opacity: 0;
            pointer-events: none;
        }

        .mobile-bottom-nav {
            transition: transform 0.24s ease, opacity 0.24s ease;
        }

        body.home-nav-hidden .mobile-bottom-nav {
            transform: translateX(-50%) translateY(calc(100% + 0.5rem));
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 359px) {
            :root {
                --hero-height: clamp(26rem, 63vh, 32rem);
                --copy-top: clamp(1.5rem, 6vh, 2.4rem);
                --book-width: min(90%, 20rem);
            }

            .home-copy h1 {
                font-size: clamp(1.4rem, 7.2vw, 1.8rem);
            }

            .home-copy p {
                font-size: clamp(0.9rem, 4.7vw, 1rem);
            }
        }

        @media (min-width: 430px) {
            :root {
                --hero-height: clamp(34rem, 69vh, 41rem);
                --copy-side: clamp(1rem, 4vw, 1.5rem);
                --copy-top: clamp(2.2rem, 7vh, 3.6rem);
                --book-width: min(84%, 24rem);
            }
        }

        @media (max-height: 700px) {
            :root {
                --hero-height: clamp(22rem, 58vh, 28rem);
                --book-height: clamp(2.9rem, 7.7vh, 3.5rem);
                --book-bottom: clamp(0.8rem, 3.8vh, 1.2rem);
            }
        }
    </style>
</head>
<body class="home-nav-hidden">
<div class="mobile-app">
    <header class="mobile-header">
        <a class="brand" href="mobile-home.html"><img src="images/logoRed.png" alt="Wegoinn"></a>
        <div class="lang-toggle"><button class="lang-btn" data-lang="en">EN</button><button class="lang-btn" data-lang="ko">KO</button></div>
        <button class="menu-btn" aria-label="menu"><span></span><span></span><span></span></button>
        <img class="corner-sloth" src="images/slothHi.png" alt="sloth">
    </header>

    <nav class="mobile-menu">
        <a href="mobile-about.html" data-ko="소개" data-en="About">소개</a>
        <a href="mobile-rooms.html" data-ko="객실 유형" data-en="Room Types">객실 유형</a>
        <a href="mobile-facilities.html" data-ko="시설" data-en="Facilities">시설</a>
        <a href="mobile-location.html" data-ko="찾아오시는 길" data-en="Location">찾아오시는 길</a>
        <a href="mobile-faq.html" data-ko="자주 묻는 질문" data-en="FAQ">자주 묻는 질문</a>
        <a href="mobile-contact.html" data-ko="연락처" data-en="Contact">연락처</a>
    </nav>

    <main class="main home-main">
        <section class="home-hero">
            <img src="images/homeArtMobile.png" alt="Wegoinn mobile hero" draggable="false">
            <div class="home-copy">
                <h1 data-ko="위고인 호스텔" data-en="Wegoinn Hostel">위고인 호스텔</h1>
                <p data-ko="Your Casual Seoul, We Go&#63; INN&#33;" data-en="Your Casual Seoul, We Go&#63; INN&#33;">Your Casual Seoul, We Go&#63; INN&#33;</p>
            </div>
            <a class="home-book" href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener">BOOK NOW</a>
        </section>
    </main>

    <nav class="mobile-bottom-nav">
        <a class="active" href="mobile-home.html"><span class="icon">⌂</span><span data-ko="홈" data-en="Home">홈</span></a>
        <a href="mobile-rooms.html"><span class="icon">🛏</span><span data-ko="객실" data-en="Rooms">객실</span></a>
        <a href="mobile-facilities.html"><span class="icon">☕</span><span data-ko="시설" data-en="Facilities">시설</span></a>
        <a href="mobile-location.html"><span class="icon">◎</span><span data-ko="위치" data-en="Location">위치</span></a>
        <a href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener"><span class="icon">🗂</span><span data-ko="예약하기" data-en="Book Now">예약하기</span></a>
    </nav>
</div>
<script src="mobile-red-city.js"></script>

<script>
(function () {
    const nav = document.querySelector('.mobile-bottom-nav');
    if (!nav) return;

    let hidden = true;
    let touchY = null;
    const threshold = 2;

    function setHidden(nextHidden) {
        hidden = nextHidden;
        document.body.classList.toggle('home-nav-hidden', hidden);
    }

    setHidden(true);

    window.addEventListener('touchstart', function (e) {
        if (!e.touches || !e.touches.length) return;
        touchY = e.touches[0].clientY;
    }, { passive: true });

    window.addEventListener('touchmove', function (e) {
        if (touchY === null || !e.touches || !e.touches.length) return;
        const currentY = e.touches[0].clientY;
        const deltaY = currentY - touchY;

        if (Math.abs(deltaY) < threshold) return;

        if (deltaY < 0) {
            // swipe up: show categories
            setHidden(false);
        } else {
            // swipe down: hide categories
            setHidden(true);
        }

        touchY = currentY;
    }, { passive: true });
})();
</script>

</body>
</html>
