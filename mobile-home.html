<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Wegoinn Mobile - Home</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mobile-red-city.css">
    <style>
        body.page-home {
            margin: 0;
            min-height: 100vh;
            background: #eeeeee;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
            font-family: 'Poppins', sans-serif;
        }

        .page-home .mobile-app {
            width: 390px;
            max-width: 100%;
            background: #ffffff;
            border: 1px solid #d8d8d8;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.16);
            overflow: hidden;
            position: relative;
            padding: 0;
        }

        .page-home .mobile-header {
            position: relative;
            top: auto;
            left: auto;
            transform: none;
            max-width: none;
            width: 100%;
            height: 72px;
            padding: 0 16px;
            border-bottom: 1px solid #ebebeb;
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            gap: 10px;
            background: #ffffff;
        }

        .page-home .brand img {
            width: 100px;
            height: 28px;
            object-fit: contain;
            display: block;
        }

        .page-home .lang-toggle {
            width: 100px;
            height: 44px;
            border-radius: 22px;
            background: #eceff3;
            border: 0;
            padding: 4px;
            display: inline-flex;
            gap: 4px;
        }

        .page-home .lang-btn {
            width: 48px;
            height: 36px;
            border: 0;
            border-radius: 18px;
            background: transparent;
            color: #646b78;
            font-size: 14px;
            font-weight: 700;
            padding: 0;
        }

        .page-home .lang-btn.active {
            background: #e91f3b;
            color: #ffffff;
            box-shadow: 0 8px 16px rgba(233, 31, 59, 0.28);
        }

        .page-home .menu-btn {
            width: 48px;
            height: 48px;
            border: 1px solid #d8dde5;
            border-radius: 12px;
            background: #fafafa;
            display: grid;
            place-content: center;
            gap: 4px;
            justify-self: end;
        }

        .page-home .menu-btn span {
            width: 18px;
            height: 2px;
            background: #4a5568;
            border-radius: 2px;
            display: block;
        }

        .page-home .corner-sloth {
            width: 30px;
            position: absolute;
            right: -8px;
            top: 20px;
            z-index: 6;
        }

        .page-home .mobile-menu {
            top: auto;
            bottom: 132px;
            left: 50%;
            transform: translateX(-50%) translateY(12px);
            max-width: 390px;
            width: 100%;
            z-index: 50;
            border-top: 1px solid #ebebeb;
        }

        .page-home .mobile-menu.open {
            transform: translateX(-50%) translateY(0);
        }

        .page-home .main {
            padding: 0;
        }

        .hero {
            position: relative;
            height: 600px;
            overflow: hidden;
            background: #cb0018;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
            display: block;
            user-select: none;
            pointer-events: none;
            -webkit-user-drag: none;
        }

        .hero-copy {
            position: absolute;
            top: 52px;
            left: 20px;
            right: 20px;
            color: #ffffff;
            z-index: 3;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.2);
        }

        .hero-copy h1 {
            margin: 0;
            font-size: 30px;
            line-height: 34px;
            font-weight: 700;
            letter-spacing: -0.03em;
        }

        .hero-copy p {
            margin: 10px 0 0;
            font-size: 17px;
            line-height: 1.3;
            font-weight: 500;
            letter-spacing: -0.01em;
        }

        .hero-book {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            bottom: 40px;
            width: 85%;
            height: 68px;
            border-radius: 40px;
            border: 2px solid #dddddd;
            background: #ffffff;
            color: #e81e3a;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.06em;
            z-index: 3;
        }

        .page-home .mobile-bottom-nav {
            position: relative;
            left: auto;
            right: auto;
            bottom: auto;
            transform: none;
            max-width: none;
            width: 100%;
            height: 72px;
            padding: 0;
            border-top: 1px solid #e9e9e9;
            background: #f9f9f9;
            display: grid;
            grid-template-columns: repeat(5, 78px);
            justify-content: center;
            gap: 0;
        }

        .page-home .mobile-bottom-nav a {
            width: 78px;
            height: 72px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
            color: #727272;
            font-size: 11px;
            font-weight: 600;
            line-height: 1.1;
        }

        .page-home .mobile-bottom-nav .icon {
            width: 22px;
            height: 22px;
            border-radius: 999px;
            border: 1px solid #dfdfdf;
            background: #ffffff;
            display: grid;
            place-items: center;
            font-size: 12px;
        }

        .page-home .mobile-bottom-nav a.active,
        .page-home .mobile-bottom-nav a.active .icon {
            color: #e91f3b;
        }

        .page-home .mobile-bottom-nav a.active .icon {
            border-color: #f2bcc7;
            background: #fff0f3;
        }

        .android-controls {
            height: 60px;
            border-top: 1px solid #d8d8d8;
            background: #efefef;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            align-items: center;
            justify-items: center;
            font-size: 26px;
            color: #5e6368;
        }

        @media (max-width: 420px) {
            body.page-home {
                padding: 0;
                background: #ffffff;
            }

            .page-home .mobile-app {
                width: 100vw;
                min-height: 100vh;
                border: 0;
                box-shadow: none;
            }
        }
    </style>
</head>
<body class="page-home">
    <div class="mobile-app">
        <header class="mobile-header">
            <a class="brand" href="mobile-home.html" aria-label="Wegoinn home">
                <img src="images/logoRed.png" alt="Wegoinn">
            </a>

            <div class="lang-toggle">
                <button class="lang-btn" data-lang="en">EN</button>
                <button class="lang-btn" data-lang="ko">KO</button>
            </div>

            <button class="menu-btn" aria-label="menu"><span></span><span></span><span></span></button>
            <img class="corner-sloth" src="images/slothHi.png" alt="sloth">
        </header>

        <nav class="mobile-menu">
            <a href="mobile-about.html" data-ko="소개" data-en="About">소개</a>
            <a href="mobile-rooms.html" data-ko="객실 유형" data-en="Room Types">객실 유형</a>
            <a href="mobile-facilities.html" data-ko="시설" data-en="Facilities">시설</a>
            <a href="mobile-location.html" data-ko="찾아오시는 길" data-en="Location">찾아오시는 길</a>
            <a href="mobile-faq.html" data-ko="자주 묻는 질문" data-en="FAQ">자주 묻는 질문</a>
            <a href="mobile-contact.html" data-ko="연락처" data-en="Contact">연락처</a>
        </nav>

        <main class="main home-main">
            <section class="hero">
                <img src="wegoinn_hero_mobile.png" alt="Wegoinn mobile hero" draggable="false">
                <div class="hero-copy">
                    <h1 data-ko="위고인 호스텔" data-en="Wegoinn Hostel">위고인 호스텔</h1>
                    <p data-ko="Your Casual Seoul, We Go&#63; INN&#33;" data-en="Your Casual Seoul, We Go&#63; INN&#33;">Your Casual Seoul, We Go&#63; INN&#33;</p>
                </div>
                <a class="hero-book" href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener">BOOK NOW</a>
            </section>
        </main>

        <nav class="mobile-bottom-nav">
            <a class="active" href="mobile-home.html"><span class="icon">⌂</span><span data-ko="홈" data-en="Home">홈</span></a>
            <a href="mobile-rooms.html"><span class="icon">🛏</span><span data-ko="객실" data-en="Rooms">객실</span></a>
            <a href="mobile-facilities.html"><span class="icon">☕</span><span data-ko="시설" data-en="Facilities">시설</span></a>
            <a href="mobile-location.html"><span class="icon">◎</span><span data-ko="위치" data-en="Location">위치</span></a>
            <a href="https://booking-engine.onda.me/wegoinn" target="_blank" rel="noopener"><span class="icon">🗂</span><span data-ko="예약하기" data-en="Book Now">예약하기</span></a>
        </nav>

        <div class="android-controls" aria-hidden="true">
            <span>‹</span>
            <span>›</span>
            <span>⌂</span>
            <span>☞</span>
            <span>☰</span>
        </div>
    </div>

    <script src="mobile-red-city.js"></script>
</body>
</html>
